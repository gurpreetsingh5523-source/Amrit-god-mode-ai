const fs = require('fs');
const path = require('path');

const CONFIG_FILE_PATH = path.join(__dirname, 'config.ini');

function updateLLMRouterToClaude() {
  try {
    let configContent = fs.readFileSync(CONFIG_FILE_PATH, 'utf8');
    
    // Replace the LLM router name or identifier
    const newConfigContent = configContent.replace(/(llm_router=\w+)/, 'llm_router=claude');
    
    fs.writeFileSync(CONFIG_FILE_PATH, newConfigContent, 'utf8');
    
    console.log('LLM router updated to Claude.');
  } catch (error) {
    console.error(`Error updating LLM router: ${error.message}`);
  }
}

updateLLMRouterToClaude();